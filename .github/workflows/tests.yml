name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp,l1]"
      # --timeout: um deadlock (concorrência/LSP) falha alto em vez de travar o CI.
      # A suíte inclui as guardas de regressão: idempotência de arestas (anti-bloat),
      # ciclos do call graph e concorrência. Testes L1 por LSP externo se auto-pulam.
      - name: Run tests
        run: pytest -q --timeout=180
